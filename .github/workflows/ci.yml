name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]" build

      - name: Run tests
        run: python -m pytest

      - name: Run lint
        run: python -m ruff check .

      - name: Build package
        run: python -m build

  package:
    name: Package smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Install wheel
        run: python -m pip install dist/pyxis_ai-*.whl

      - name: Smoke test import
        run: python -c "import pyxis; print(pyxis.Pyxis)"

      - name: Smoke test CLI
        run: |
          pyxis --env-file missing.env demo
          pyxis --env-file missing.env workflow demo
          pyxis --env-file missing.env memory show
          printf '{"agent":{"name":"navigator"},"events":[]}' > /tmp/pyxis-session.json
          pyxis --env-file missing.env inspect /tmp/pyxis-session.json
